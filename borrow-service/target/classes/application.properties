server.port=8083
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/librarydb}
spring.data.mongodb.database=librarydb
spring.application.name=borrow-service

# URLs for inter-service communication
book-service.url=${BOOK_SERVICE_URL:http://localhost:8081}
member-service.url=${MEMBER_SERVICE_URL:http://localhost:8082}

# Actuator for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
