apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: library-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: library-app
spec:
  type: NodePort # Using NodePort for local Kubernetes clusters like Minikube
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30000
