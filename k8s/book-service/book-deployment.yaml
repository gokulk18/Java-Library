apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service
  namespace: library-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: book-service
  template:
    metadata:
      labels:
        app: book-service
    spec:
      containers:
      - name: book-service
        image: book-service:latest
        imagePullPolicy: Never # Adjust if using an external registry
        ports:
        - containerPort: 8081
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: MONGO_URI
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: book-service
  namespace: library-app
spec:
  selector:
    app: book-service
  ports:
  - port: 8081
    targetPort: 8081
